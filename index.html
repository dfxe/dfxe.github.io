<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BLOC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --black: hsl(0, 0%, 5%);
        --white: hsl(0, 0%, 97%);
        --newsprint: hsl(40, 30%, 88%);
        --red: hsl(3, 78%, 48%);
        --blue: hsl(218, 80%, 28%);
        --yellow: hsl(48, 95%, 55%);
        --gray: hsl(0, 0%, 25%);
        --light-gray: hsl(40, 20%, 82%);
      }

      html {
        font-size: 16px;
      }

      body {
        font-family: 'Lora', Georgia, serif;
        background: var(--newsprint);
        color: var(--black);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      a {
        color: var(--blue);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      /* --- Design Grid Lines --- */

      .grid-lines {
        position: fixed;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        max-width: 960px;
        height: 100%;
        pointer-events: none;
        z-index: 0;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        padding: 0 0.5rem;
      }

      .grid-lines .line {
        border-right: 1px solid var(--light-gray);
      }

      .grid-lines .line:first-child {
        border-left: 1px solid var(--light-gray);
      }

      /* Horizontal rule between header and main */
      header::after {
        content: '';
        display: block;
        height: 1px;
        background: var(--light-gray);
        margin-top: 1.125rem;
      }

      /* --- Header --- */

      header {
        max-width: 960px;
        margin: 0 auto;
        padding: 0.5rem 0.5rem 0;
        position: relative;
        z-index: 1;
      }

      header h1 {
        font-size: 2.4rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        text-transform: uppercase;
        line-height: 1;
      }

      header h1 span {
        color: var(--red);
      }

      /* --- Main --- */

      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 0 0.5rem;
        position: relative;
        z-index: 1;
      }

      /* --- Post List --- */

      .posts {
        list-style: none;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0;
      }

      .post {
        padding: 0.5rem;
        border-bottom: 1px solid var(--light-gray);
      }

      .post:last-child {
        border-bottom: none;
      }

      @media (max-width: 600px) {
        .posts {
          grid-template-columns: 1fr;
        }
      }

      .post-meta {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.25rem;
      }

      .post time {
        font-size: 0.7rem;
        color: var(--gray);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .tag {
        display: inline-block;
        font-size: 0.6rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 0.1rem 0.4rem;
        border: 1.5px solid;
      }

      .tag--red {
        color: var(--red);
        border-color: var(--red);
      }

      .tag--blue {
        color: var(--blue);
        border-color: var(--blue);
      }

      .tag--yellow {
        color: hsl(48, 70%, 25%);
        border-color: var(--yellow);
      }

      .post h2 {
        font-size: 1.15rem;
        font-weight: 700;
        line-height: 1.3;
        letter-spacing: -0.01em;
      }

      .post h2 a {
        color: var(--black);
      }

      .post h2 a:hover {
        color: var(--blue);
        text-decoration: none;
      }

      .post-body {
        margin-top: 0.25rem;
        font-size: 0.85rem;
        color: var(--gray);
        line-height: 1.6;
      }

      .post-body p {
        margin-bottom: 0.25rem;
      }

      .post-body p:last-child {
        margin-bottom: 0;
      }

      .post-body strong {
        color: var(--black);
        font-weight: 700;
      }

      .post-body em {
        font-style: italic;
      }

      .post-body code {
        background: hsl(40, 20%, 82%);
        padding: 0.1rem 0.3rem;
        font-size: 0.8rem;
      }

      .post-body pre {
        background: var(--black);
        color: var(--white);
        padding: 0.75rem;
        overflow-x: auto;
        margin-bottom: 0.25rem;
        font-size: 0.78rem;
        line-height: 1.5;
      }

      .post-body pre code {
        background: none;
        padding: 0;
        color: inherit;
        font-size: inherit;
      }

      .post-body blockquote {
        border-left: 3px solid var(--red);
        padding-left: 0.5rem;
        margin-bottom: 0.25rem;
        font-style: italic;
      }

      .post-body ul {
        list-style-position: inside;
        padding-left: 0;
        margin-bottom: 0.25rem;
      }

      .post-body li {
        margin-bottom: 0.2rem;
      }

      /* --- Post View --- */

      .post-view {
        display: none;
        max-width: 60ch;
      }

      .post-view.active {
        display: block;
      }

      .post-view .back {
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--gray);
        cursor: pointer;
        margin-bottom: 0.5rem;
        display: inline-block;
      }

      .post-view .back:hover {
        color: var(--red);
        text-decoration: none;
      }

      .post-view h2 {
        font-size: 1.6rem;
        font-weight: 700;
        line-height: 1.2;
        letter-spacing: -0.02em;
        margin-bottom: 0.25rem;
      }

      .post-view .post-view-meta {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
      }

      .posts.hidden {
        display: none;
      }

      /* --- Footer --- */

      footer {
        max-width: 960px;
        margin: 0 auto;
        padding: 1.125rem 0.5rem 0.5rem;
        text-align: left;
        font-size: 0.7rem;
        color: var(--gray);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        position: relative;
        z-index: 1;
      }

      footer::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0.5rem;
        right: 0.5rem;
        height: 2px;
        border-radius: 1px;
        background: linear-gradient(
          to right,
          var(--black) 0%,
          var(--black) 14%,
          var(--yellow) 14%,
          var(--yellow) 29%,
          var(--blue) 29%,
          var(--blue) 57%,
          var(--red) 57%,
          var(--red) 100%
        );
      }
    </style>
  </head>
  <body>
    <div class="grid-lines">
      <div class="line"></div>
      <div class="line"></div>
      <div class="line"></div>
      <div class="line"></div>
    </div>

    <header>
      <h1>BL<span>OC</span></h1>
    </header>

    <main>
      <article class="post-view" id="post-view"></article>

      <ul class="posts">
        <li class="post">
          <div class="post-meta">
            <time datetime="2026-02-25">25 Feb 2026</time>
            <span class="tag tag--red">Draft</span>
          </div>
          <h2><a href="#">Your title here</a></h2>
          <script type="text/markdown">
            This is a placeholder post. Replace it with your own writing.

            You can use **bold**, *italic*, and `inline code`.

            - First point goes here
            - Second point goes here
            - Third point goes here

            > A quote that matters to you.

            Write something worth reading, or do something worth writing.
          </script>
        </li>
      </ul>
    </main>

    <footer>2026 — dfxe</footer>

    <script>
      function esc(t) {
        return t
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }
      function inline(t) {
        return t
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          .replace(/\*([^*]+)\*/g, '<em>$1</em>')
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
      }
      function parseMd(txt) {
        var lines = txt.replace(/^\n+/, '').replace(/\n+$/, '').split('\n');
        var indent = lines.reduce(function (m, l) {
          if (!l.trim()) return m;
          return Math.min(m, l.match(/^ */)[0].length);
        }, Infinity);
        if (indent > 0 && indent < Infinity)
          lines = lines.map(function (l) {
            return l.slice(indent);
          });
        var html = '';
        lines
          .join('\n')
          .split(/\n{2,}/)
          .forEach(function (block) {
            block = block.trim();
            if (!block) return;
            if (block.match(/^```/)) {
              html +=
                '<pre><code>' +
                esc(block.replace(/^```\w*\n?/, '').replace(/\n?```$/, '')) +
                '</code></pre>';
            } else if (block.match(/^>/)) {
              html +=
                '<blockquote><p>' +
                inline(block.replace(/^>\s?/gm, '')) +
                '</p></blockquote>';
            } else if (block.match(/^- /m)) {
              html +=
                '<ul>' +
                block
                  .split(/\n/)
                  .map(function (l) {
                    return '<li>' + inline(l.replace(/^- /, '')) + '</li>';
                  })
                  .join('') +
                '</ul>';
            } else if (block.match(/^#{1,6} /)) {
              var m = block.match(/^(#{1,6}) (.+)/);
              html +=
                '<h' +
                m[1].length +
                '>' +
                inline(m[2]) +
                '</h' +
                m[1].length +
                '>';
            } else {
              html += '<p>' + inline(block.replace(/\n/g, ' ')) + '</p>';
            }
          });
        return html;
      }

      // render markdown in post list
      document
        .querySelectorAll('script[type="text/markdown"]')
        .forEach(function (s) {
          var div = document.createElement('div');
          div.className = 'post-body';
          div.innerHTML = parseMd(s.textContent);
          s.parentNode.replaceChild(div, s);
        });

      // post view
      var postList = document.querySelector('.posts');
      var postView = document.getElementById('post-view');

      document.querySelectorAll('.post h2 a').forEach(function (a) {
        a.addEventListener('click', function (e) {
          e.preventDefault();
          var post = a.closest('.post');
          var title = a.textContent;
          var meta = post.querySelector('.post-meta').innerHTML;
          var body = post.querySelector('.post-body').innerHTML;
          postView.innerHTML =
            '<a class="back" href="#">&larr; Back</a>' +
            '<h2>' +
            title +
            '</h2>' +
            '<div class="post-view-meta">' +
            meta +
            '</div>' +
            '<div class="post-body">' +
            body +
            '</div>';
          postList.classList.add('hidden');
          postView.classList.add('active');
          postView
            .querySelector('.back')
            .addEventListener('click', function (e) {
              e.preventDefault();
              postView.classList.remove('active');
              postList.classList.remove('hidden');
            });
        });
      });
    </script>
  </body>
</html>
